version: "3.9"

services:
  db:
    image: postgres:16
    container_name: remote_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - remote_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: remote_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      APP_ENV: ${APP_ENV}
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT}:8000"

volumes:
  remote_data:
